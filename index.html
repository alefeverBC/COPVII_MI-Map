<script>
const INTEREST_COLORS = {
  'MI':   { fill:'#2563eb', stroke:'#1e3a8a' },
  'NPRI': { fill:'#2563eb', stroke:'#1e3a8a' },
  'OR':   { fill:'#dc2626', stroke:'#7f1d1d' },
};
function getColors(p) {
  return INTEREST_COLORS[p.interest_t] || { fill:'#94a3b8', stroke:'#475569' };
}
const map = L.map('map', { center:[37.5,-90], zoom:5, zoomControl:true });
L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution:'&copy; OpenStreetMap &copy; CARTO', subdomains:'abcd', maxZoom:19
}).addTo(map);
// County and state boundaries + labels from us-atlas
fetch('https://cdn.jsdelivr.net/npm/us-atlas@3/counties-10m.json')
  .then(r => { if(!r.ok) throw new Error(); return r.json(); })
  .then(topo => {
    const countiesGeo = topojson.feature(topo, topo.objects.counties);
    L.geoJSON(countiesGeo, { style:{ color:'#374151', weight:1.6, opacity:0.65, fillOpacity:0 }, interactive:false }).addTo(map);
    L.geoJSON(topojson.feature(topo, topo.objects.states), { style:{ color:'#111827', weight:2.5, opacity:0.7, fillOpacity:0 }, interactive:false }).addTo(map);
    const labelLayer = L.layerGroup().addTo(map);
    function polygonCentroid(ring) {
      let area=0,cx=0,cy=0,n=ring.length;
      for(let i=0,j=n-1;i<n;j=i++){const xi=ring[i][0],yi=ring[i][1],xj=ring[j][0],yj=ring[j][1],a=xi*yj-xj*yi;area+=a;cx+=(xi+xj)*a;cy+=(yi+yj)*a;}
      area/=2;
      if(Math.abs(area)<1e-12){let x0=Infinity,x1=-Infinity,y0=Infinity,y1=-Infinity;ring.forEach(c=>{x0=Math.min(x0,c[0]);x1=Math.max(x1,c[0]);y0=Math.min(y0,c[1]);y1=Math.max(y1,c[1]);});return[(x0+x1)/2,(y0+y1)/2];}
      return[cx/(6*area),cy/(6*area)];
    }
    function featureCentroid(f){
      const g=f.geometry;
      if(g.type==='Polygon') return polygonCentroid(g.coordinates[0]);
      if(g.type==='MultiPolygon'){let bA=-Infinity,bR=null;g.coordinates.forEach(p=>{const r=p[0];let a=0,n=r.length;for(let i=0,j=n-1;i<n;j=i++)a+=(r[j][0]+r[i][0])*(r[j][1]-r[i][1]);a=Math.abs(a)/2;if(a>bA){bA=a;bR=r;}});return polygonCentroid(bR);}
      return null;
    }
    function updateLabels(){
      labelLayer.clearLayers();
      if(map.getZoom()<7) return;
      const bounds=map.getBounds();
      countiesGeo.features.forEach(f=>{
        if(!f.properties.name) return;
        const c=featureCentroid(f);
        if(!c||!bounds.contains([c[1],c[0]])) return;
        L.marker([c[1],c[0]],{icon:L.divIcon({className:'',html:'<div style="width:140px;text-align:center;font-family:sans-serif;font-size:12px;color:#1a1a2e;font-weight:700;letter-spacing:0.03em;pointer-events:none;text-shadow:0 0 3px #f5f2ec,0 0 4px #f5f2ec,1px 1px 0 #f5f2ec,-1px -1px 0 #f5f2ec,1px -1px 0 #f5f2ec,-1px 1px 0 #f5f2ec">'+f.properties.name+'</div>',iconSize:[140,20],iconAnchor:[70,10]}),interactive:false}).addTo(labelLayer);
      });
    }
    map.on('zoomend moveend', updateLabels);
    document.getElementById('county-status').textContent='County lines loaded';
    setTimeout(()=>document.getElementById('county-status').style.display='none',2500);
  })
  .catch(()=>{
    document.getElementById('county-status').textContent='County lines unavailable';
    setTimeout(()=>document.getElementById('county-status').style.display='none',3000);

  geoLayer.eachLayer(layer=>{
    const p=layer.feature.properties;
    const show = currentType==='all' || p.interest_t===currentType || (currentType==='MI' && p.interest_t==='NPRI');
    if(show){layer.setStyle(styleFeature(layer.feature));visible++;}
    else{layer.setStyle({fillOpacity:0.04,opacity:0.12,weight:0.5});}
  });
  document.getElementById('stat-visible').textContent=visible.toLocaleString();
}
function filterType(btn,type){
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  currentType=type;
  applyFilter();
  if(type!=='all'){
    const bounds=[];
    geoLayer.eachLayer(layer=>{
      const p=layer.feature.properties;
      const match = p.interest_t===type || (type==='MI' && p.interest_t==='NPRI');
      if(match) bounds.push(layer.getBounds());
    });
    if(bounds.length){const combined=bounds.reduce((a,b)=>a.extend(b),L.latLngBounds(bounds[0]));map.fitBounds(combined,{padding:[50,50]});}
  } else {map.fitBounds(geoLayer.getBounds(),{padding:[30,30]});}
}
</script>
